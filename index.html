<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Clinic Dashboard</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial;
        }

        body {
            display: flex;
            min-height: 100vh;
            background: #f1f5f9;
            overflow-x: hidden;
        }

        /* SIDEBAR */

        .sidebar {
            width: 230px;
            background: #0f172a;
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 10px;
        }

        .sidebar button {
            background: none;
            border: none;
            color: white;
            padding: 10px;
            cursor: pointer;
            border-radius: 6px;
            text-align: left;
        }

        .sidebar button:hover {
            background: #1e293b;
        }

        /* MAIN */

        .main {
            flex: 1;
            padding: 25px;
            background: white;
            margin: 10px;
            border-radius: 10px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        /* INPUTS */

        input,
        select,
        textarea {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
            margin: 4px;
        }

        /* BUTTON STYLE */

        button {
            border: none;
            border-radius: 6px;
            padding: 6px 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .add-btn {
            background: #2563eb;
            color: white;
        }

        .option-btn {
            background: #0ea5e9;
            color: white;
        }

        .delete {
            background: #ef4444;
            color: white;
        }

        .small {
            font-size: 12px;
        }

        /* TABLE */

        .table-container {
            overflow-x: auto;
            margin-top: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #2563eb;
            color: white;
        }

        /* STATUS COLORS */

        .pending {
            background: #fef08a;
        }

        .completed {
            background: #bbf7d0;
        }

        /* MODAL */

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 20px;
            width: 450px;
            border-radius: 10px;
            max-height: 90vh;
            overflow: auto;
        }

        .feedback-item {
            background: #f1f5f9;
            padding: 6px;
            margin: 4px 0;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
        }

        /* NOTES */

        .note {
            background: #f1f5f9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        /* MOBILE */

        @media(max-width:768px) {

            body {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                flex-direction: row;
                overflow-x: auto;
            }

            .sidebar h2 {
                display: none;
            }

            .main {
                margin: 0;
                border-radius: 0;
            }

        }

        .pending {
            background: #fef08a;
        }

        .completed {
            background: #bbf7d0;
        }

        .btn-pending {
            background: #facc15;
            color: black;
        }

        .btn-done {
            background: #22c55e;
            color: white;
        }

        .btn-pending {
            background: #facc15;
            color: black;
        }

        .btn-done {
            background: #22c55e;
            color: white;
        }

        .option-btn {
            background: #0ea5e9;
            color: white;
            padding: 6px 10px;
            border-radius: 6px;
        }

        .delete {
            background: #ef4444;
            color: white;
        }
    </style>
</head>

<body>

    <div class="sidebar">

        <h2>Clinic</h2>

        <button onclick="showSection('clients')">Clients</button>

        <button onclick="showSection('newclient')">New Clients</button>

        <button onclick="showSection('send')">Send Medicine</button>

        <button onclick="showSection('review')">Review</button>

        <button onclick="showSection('notes')">Notes</button>

    </div>

    <div class="main">

        <!-- CLIENTS -->

        <div id="clients" class="section active">

            <h2>Clients</h2>

            <input id="clientName" placeholder="Name">
            <input id="clientDisease" placeholder="Disease">
            <input id="clientPhone" placeholder="Phone">

            <button class="add-btn" onclick="addClient()">Add Client</button>

            <div class="table-container">

                <table>

                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Disease</th>
                            <th>Phone</th>
                            <th>Options</th>
                        </tr>
                    </thead>

                    <tbody id="clientTable"></tbody>

                </table>

            </div>

        </div>

        <!-- SEND -->

        <div id="send" class="section">

            <h2>Send Medicine</h2>

            <table>

                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Disease</th>
                        <th>Phone</th>
                        <th>Options</th>
                        <th>Done</th>
                        <th>Delete</th>
                    </tr>
                </thead>

                <tbody id="sendTable"></tbody>

            </table>

        </div>

        <!-- REVIEW -->

        <div id="review" class="section">

            <h2>Review</h2>

            <table>

                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Disease</th>
                        <th>Phone</th>
                        <th>Options</th>
                        <th>Done</th>
                        <th>Delete</th>
                    </tr>
                </thead>

                <tbody id="reviewTable"></tbody>

            </table>

        </div>

        <!-- NOTES -->

        <div id="notes" class="section">

            <h2>Notes</h2>

            <input id="noteTitle" placeholder="Title">
            <br>

            <textarea id="noteBody" placeholder="Write note..." rows="4"></textarea>

            <br>

            <button class="add-btn" onclick="addNote()">Add Note</button>

            <div id="notesContainer"></div>

        </div>
        <div id="newclient" class="section">

            <h2>New Clients</h2>

            <input id="newName" placeholder="Name">
            <input id="newDisease" placeholder="Disease">
            <input id="newPhone" placeholder="Phone">

            <button class="add-btn" onclick="addNewClient()">Add</button>

            <div class="table-container">

                <table>

                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Disease</th>
                            <th>Phone</th>
                            <th>Move</th>
                            <th>Options</th>
                            <th>Delete</th>
                        </tr>
                    </thead>

                    <tbody id="newClientTable"></tbody>

                </table>

            </div>

        </div>

    </div>

    <!-- CLIENT MODAL -->

    <div class="modal" id="clientModal">

        <div class="modal-content">

            <h3 id="modalTitle"></h3>

            <h4>Status</h4>
            <select id="clientStatus">
                <option>Active</option>
                <option>Inactive</option>
            </select>

            <h4>Address</h4>
            <textarea id="clientAddress" rows="2"></textarea>

            <h4>Report</h4>
            <textarea id="clientReport" rows="3"></textarea>

            <hr>

            <h4>Feedback</h4>

            <input type="date" id="fdate">

            <textarea id="fprogress" placeholder="Progress"></textarea>

            <textarea id="fmedicine" placeholder="Medicines"></textarea>

            <button class="add-btn" onclick="addFeedback()">Add Feedback</button>

            <div id="feedbackList"></div>

            <hr>

            <button id="sendBtn" class="btn-pending" onclick="toggleSend()">Send Medicine</button>
            <button id="reviewBtn" class="btn-pending" onclick="toggleReview()">Add Review</button>

            <br><br>

            <div style="display:flex;justify-content:space-between">

                <button onclick="closeClientModal()">Close</button>

                <button class="delete" onclick="deleteClient()">Delete Client</button>

            </div>

        </div>

    </div>

    <script>
        /* NAV */

        function showSection(id) {
            document.querySelectorAll(".section").forEach(s => s.classList.remove("active"))
            document.getElementById(id).classList.add("active")
        }

        /* STORAGE */

        let clients = JSON.parse(localStorage.getItem("clients") || "[]")
        let sendList = JSON.parse(localStorage.getItem("sendList") || "[]")
        let reviewList = JSON.parse(localStorage.getItem("reviewList") || "[]")
        let notes = JSON.parse(localStorage.getItem("notes") || "[]")
        let newClients = JSON.parse(localStorage.getItem("newClients") || "[]")

        function save() {
            localStorage.setItem("clients", JSON.stringify(clients))
            localStorage.setItem("sendList", JSON.stringify(sendList))
            localStorage.setItem("reviewList", JSON.stringify(reviewList))
            localStorage.setItem("notes", JSON.stringify(notes))
            localStorage.setItem("newClients", JSON.stringify(newClients))
        }

        /* CLIENTS */

        function addClient() {

            clients.push({
                name: clientName.value,
                disease: clientDisease.value,
                phone: clientPhone.value,
                status: "Active",
                address: "",
                report: "",
                feedback: [],
                medicineSent: false,
                reviewAdded: false
            })

            save()
            renderClients()

        }

        function renderClients() {

            clientTable.innerHTML = ""

            clients.forEach((c, i) => {

                clientTable.innerHTML += `
<tr>
<td>${c.name}</td>
<td>${c.disease}</td>
<td>${c.phone}</td>
<td>
<button class="option-btn" onclick="openClient(${i})">
Options
</button>
</td>
</tr>
`

            })

        }

        renderClients()

        /* CLIENT MODAL */

        let currentClient = null

        function openClient(i) {

            currentClient = i
            let c = clients[i]

            modalTitle.innerText = c.name

            clientStatus.value = c.status || "Active"
            clientAddress.value = c.address || ""
            clientReport.value = c.report || ""

            updateOptionButtons()

            clientModal.style.display = "flex"

            renderFeedback()

        }

        function closeClientModal() {
            clientModal.style.display = "none"
        }

        clientStatus.onchange = () => {
            clients[currentClient].status = clientStatus.value
            save()
        }

        clientAddress.oninput = () => {
            clients[currentClient].address = clientAddress.value
            save()
        }

        clientReport.oninput = () => {
            clients[currentClient].report = clientReport.value
            save()
        }

        /* BUTTON STATE */

        function updateOptionButtons() {

            let c = clients[currentClient]

            if (c.medicineSent) {
                sendBtn.className = "btn-done"
                sendBtn.innerText = "Medicine Sent"
            } else {
                sendBtn.className = "btn-pending"
                sendBtn.innerText = "Send Medicine"
            }

            if (c.reviewAdded) {
                reviewBtn.className = "btn-done"
                reviewBtn.innerText = "Review Added"
            } else {
                reviewBtn.className = "btn-pending"
                reviewBtn.innerText = "Add Review"
            }

        }

        /* SEND MEDICINE */

        function toggleSend() {

            let c = clients[currentClient]

            c.medicineSent = !c.medicineSent

            if (c.medicineSent) {

                sendList.push({
                    name: c.name,
                    disease: c.disease,
                    phone: c.phone,
                    done: false
                })

            }

            save()
            renderSend()
            updateOptionButtons()

        }

        /* REVIEW */

        function toggleReview() {

            let c = clients[currentClient]

            c.reviewAdded = !c.reviewAdded

            if (c.reviewAdded) {

                reviewList.push({
                    name: c.name,
                    disease: c.disease,
                    phone: c.phone,
                    done: false
                })

            }

            save()
            renderReview()
            updateOptionButtons()

        }

        /* SEND PAGE */

        function renderSend() {

            sendTable.innerHTML = ""

            sendList.forEach((s, i) => {

                sendTable.innerHTML += `
<tr>
<td>${s.name}</td>
<td>${s.disease}</td>
<td>${s.phone}</td>

<td>
<button class="option-btn" onclick="openClientByName('${s.name}')">
Options
</button>
</td>

<td>
<input type="checkbox"
${s.done ? "checked" : ""}
onclick="toggleSendDone(${i})">
</td>

<td>
<button class="delete" onclick="deleteSend(${i})">Delete</button>
</td>

</tr>
`

            })

        }

        function toggleSendDone(i) {
            sendList[i].done = !sendList[i].done
            save()
            renderSend()
        }

        function deleteSend(i) {
            sendList.splice(i, 1)
            save()
            renderSend()
        }

        renderSend()

        /* REVIEW PAGE */

        function renderReview() {

            reviewTable.innerHTML = ""

            reviewList.forEach((r, i) => {

                reviewTable.innerHTML += `
<tr>
<td>${r.name}</td>
<td>${r.disease}</td>
<td>${r.phone}</td>

<td>
<button class="option-btn" onclick="openClientByName('${r.name}')">
Options
</button>
</td>

<td>
<input type="checkbox"
${r.done ? "checked" : ""}
onclick="toggleReviewDone(${i})">
</td>

<td>
<button class="delete" onclick="deleteReview(${i})">Delete</button>
</td>

</tr>
`

            })

        }

        function toggleReviewDone(i) {
            reviewList[i].done = !reviewList[i].done
            save()
            renderReview()
        }

        function deleteReview(i) {
            reviewList.splice(i, 1)
            save()
            renderReview()
        }

        renderReview()

        /* OPEN CLIENT BY NAME */

        function openClientByName(name) {

            let index = clients.findIndex(c => c.name === name)

            if (index !== -1) {
                openClient(index)
            }

        }

        /* FEEDBACK */

        function addFeedback() {

            let c = clients[currentClient]

            c.feedback.push({
                date: fdate.value,
                progress: fprogress.value,
                medicine: fmedicine.value
            })

            save()
            renderFeedback()

        }

        function renderFeedback() {

            let c = clients[currentClient]

            feedbackList.innerHTML = ""

            c.feedback.forEach((f, i) => {

                feedbackList.innerHTML += `
<div class="feedback-item">
${f.date} | ${f.progress} | ${f.medicine}
<button class="delete" onclick="deleteFeedback(${i})">x</button>
</div>
`

            })

        }

        function deleteFeedback(i) {
            clients[currentClient].feedback.splice(i, 1)
            save()
            renderFeedback()
        }

        /* NOTES */

        function addNote() {

            notes.push({
                title: noteTitle.value,
                body: noteBody.value
            })

            noteTitle.value = ""
            noteBody.value = ""

            save()
            renderNotes()

        }

        function renderNotes() {

            notesContainer.innerHTML = ""

            notes.forEach((n, i) => {

                notesContainer.innerHTML += `
<div class="note">

<h4>${n.title}</h4>
<p>${n.body}</p>

<button class="delete" onclick="deleteNote(${i})">Delete</button>

</div>
`

            })

        }

        function deleteNote(i) {
            notes.splice(i, 1)
            save()
            renderNotes()
        }

        renderNotes()

        /* NEW CLIENTS */

        function addNewClient() {

            newClients.push({
                name: newName.value,
                disease: newDisease.value,
                phone: newPhone.value
            })

            save()
            renderNewClients()

        }

        function renderNewClients() {

            newClientTable.innerHTML = ""

            newClients.forEach((c, i) => {

                newClientTable.innerHTML += `
<tr>
<td>${c.name}</td>
<td>${c.disease}</td>
<td>${c.phone}</td>

<td>
<button onclick="moveClient(${i})">Move</button>
</td>

<td>
<button class="option-btn" onclick="openNewClientOptions(${i})">
Options
</button>
</td>

<td>
<button class="delete" onclick="deleteNewClient(${i})">Delete</button>
</td>

</tr>
`

            })

        }

        function moveClient(i) {

            clients.push({
                ...newClients[i],
                status: "Active",
                address: "",
                report: "",
                feedback: [],
                medicineSent: false,
                reviewAdded: false
            })

            newClients.splice(i, 1)

            save()

            renderNewClients()
            renderClients()

        }

        function deleteNewClient(i) {
            newClients.splice(i, 1)
            save()
            renderNewClients()
        }

        function openNewClientOptions(i) {
            modalTitle.innerText = newClients[i].name
            clientModal.style.display = "flex"
        }

        renderNewClients()
    </script>

</body>

</html>
```
