<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Clinic Dashboard</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial
}

body{
display:flex;
min-height:100vh;
background:#f1f5f9;
overflow-x:hidden
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#0f172a;
color:white;
padding:20px;
display:flex;
flex-direction:column;
gap:10px
}

.sidebar h2{
text-align:center
}

.sidebar button{
background:none;
border:none;
color:white;
padding:10px;
cursor:pointer;
border-radius:6px;
text-align:left
}

.sidebar button:hover{
background:#1e293b
}

/* MAIN */

.main{
flex:1;
padding:25px;
background:white;
margin:10px;
border-radius:10px;
box-shadow:0 6px 20px rgba(0,0,0,0.1)
}

.section{
display:none
}

.section.active{
display:block
}

/* INPUT */

input,select,textarea{
padding:10px;
border:1px solid #ccc;
border-radius:6px;
margin:5px
}

/* BUTTON */

.add-btn{
background:#2563eb;
color:white;
border:none;
padding:9px 14px;
border-radius:6px;
cursor:pointer
}

.small{
padding:5px 8px;
font-size:12px
}

.delete{
background:#ef4444;
color:white;
border:none;
padding:6px 10px;
border-radius:5px;
cursor:pointer
}

/* TABLE */

.table-container{
overflow-x:auto;
margin-top:10px
}

table{
width:100%;
border-collapse:collapse
}

th,td{
padding:10px;
border-bottom:1px solid #ddd
}

th{
background:#2563eb;
color:white
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center
}

.modal-content{
background:white;
padding:20px;
width:500px;
border-radius:10px;
max-height:90vh;
overflow:auto
}

.feedback-item{
background:#f1f5f9;
padding:6px;
margin:4px 0;
border-radius:5px;
display:flex;
justify-content:space-between
}

/* REVIEW COLORS */

.review-done{
background:#bbf7d0
}

.review-due{
background:#fef08a
}

/* MOBILE */

@media(max-width:768px){

body{
flex-direction:column
}

.sidebar{
width:100%;
flex-direction:row;
overflow-x:auto
}

.sidebar h2{
display:none
}

.main{
margin:0;
border-radius:0
}

}

</style>
</head>

<body>

<div class="sidebar">

<h2>Clinic</h2>

<button onclick="showSection('clients')">Clients</button>
<button onclick="showSection('send')">Send Medicine</button>
<button onclick="showSection('newclient')">New Clients</button>
<button onclick="showSection('review')">Review</button>
<button onclick="showSection('notes')">Notes</button>

</div>

<div class="main">

<!-- CLIENTS -->

<div id="clients" class="section active">

<h2>Clients</h2>

<input id="clientName" placeholder="Name">
<input id="clientDisease" placeholder="Disease">
<input id="clientPhone" placeholder="Phone">

<button class="add-btn" onclick="addClient()">Add Client</button>

<div class="table-container">

<table>

<thead>
<tr>
<th>Name</th>
<th>Disease</th>
<th>Phone</th>
<th>Options</th>
</tr>
</thead>

<tbody id="clientTable"></tbody>

</table>

</div>

</div>

<!-- SEND -->

<div id="send" class="section">

<h2>Send Medicine</h2>

<table>
<thead>
<tr>
<th>Name</th>
<th>Disease</th>
<th>Phone</th>
<th>Done</th>
<th>Delete</th>
</tr>
</thead>

<tbody id="sendTable"></tbody>

</table>

</div>

<!-- NEW CLIENT -->

<div id="newclient" class="section">

<h2>New Clients</h2>

<input id="newName" placeholder="Name">
<input id="newDisease" placeholder="Disease">
<input id="newPhone" placeholder="Phone">

<button class="add-btn" onclick="addNewClient()">Add</button>

<table>

<thead>
<tr>
<th>Name</th>
<th>Disease</th>
<th>Phone</th>
<th>Move</th>
<th>Delete</th>
</tr>
</thead>

<tbody id="newClientTable"></tbody>

</table>

</div>

<!-- REVIEW -->

<div id="review" class="section">

<h2>Review</h2>

<input id="reviewName" placeholder="Name">
<input id="reviewDisease" placeholder="Disease">
<input id="reviewPhone" placeholder="Phone">

<button class="add-btn" onclick="addReview()">Add</button>

<table>

<thead>
<tr>
<th>Name</th>
<th>Disease</th>
<th>Phone</th>
<th>Done</th>
<th>Delete</th>
</tr>
</thead>

<tbody id="reviewTable"></tbody>

</table>

</div>

<!-- NOTES -->

<div id="notes" class="section">

<h2>Notes</h2>

<button class="add-btn" onclick="addNote()">Add Note</button>

<div id="notesContainer"></div>

</div>

</div>

<!-- CLIENT MODAL -->

<div class="modal" id="clientModal">

<div class="modal-content">

<h3 id="modalTitle"></h3>

<h4>Status</h4>

<select id="clientStatus">
<option>Active</option>
<option>Inactive</option>
</select>

<h4>Address</h4>

<textarea id="clientAddress" rows="3" style="width:100%"></textarea>

<h4>Report</h4>

<textarea id="clientReport" rows="4" style="width:100%"></textarea>

<hr>

<h4>Feedback</h4>

<input type="date" id="fdate">

<textarea id="fprogress" placeholder="Progress" rows="2"></textarea>

<textarea id="fmedicine" placeholder="Medicines" rows="2"></textarea>

<button onclick="addFeedback()">Add Feedback</button>

<div id="feedbackList"></div>

<hr>

<button onclick="addReviewFromClient()">Add Review</button>
<button onclick="addSendFromClient()">Send Medicine</button>

<br><br>

<div style="display:flex;justify-content:space-between">

<button onclick="closeClientModal()">Close</button>

<button class="delete" onclick="deleteClient()">Delete Client</button>

</div>

</div>

</div>

<script>

/* NAV */

function showSection(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

/* STORAGE */

let clients=JSON.parse(localStorage.getItem("clients")||"[]")
let newClients=JSON.parse(localStorage.getItem("newClients")||"[]")
let sendList=JSON.parse(localStorage.getItem("sendList")||"[]")
let reviewList=JSON.parse(localStorage.getItem("reviewList")||"[]")
let notes=JSON.parse(localStorage.getItem("notes")||"[]")

function save(){
localStorage.setItem("clients",JSON.stringify(clients))
localStorage.setItem("newClients",JSON.stringify(newClients))
localStorage.setItem("sendList",JSON.stringify(sendList))
localStorage.setItem("reviewList",JSON.stringify(reviewList))
localStorage.setItem("notes",JSON.stringify(notes))
}

/* CLIENT */

function addClient(){

clients.push({
name:clientName.value,
disease:clientDisease.value,
phone:clientPhone.value,
status:"Active",
address:"",
report:"",
feedback:[]
})

save()
renderClients()

}

function renderClients(){

clientTable.innerHTML=""

clients.forEach((c,i)=>{

clientTable.innerHTML+=`
<tr>
<td>${c.name}</td>
<td>${c.disease}</td>
<td>${c.phone}</td>
<td><button class="small" onclick="openClient(${i})">Options</button></td>
</tr>
`

})

}

renderClients()

/* NEW CLIENT */

function addNewClient(){

newClients.push({
name:newName.value,
disease:newDisease.value,
phone:newPhone.value
})

save()
renderNewClients()

}

function renderNewClients(){

newClientTable.innerHTML=""

newClients.forEach((c,i)=>{

newClientTable.innerHTML+=`
<tr>
<td>${c.name}</td>
<td>${c.disease}</td>
<td>${c.phone}</td>
<td><button onclick="moveClient(${i})">Move</button></td>
<td><button class="delete" onclick="deleteNewClient(${i})">Delete</button></td>
</tr>
`

})

}

function moveClient(i){
clients.push(newClients[i])
newClients.splice(i,1)
save()
renderClients()
renderNewClients()
}

function deleteNewClient(i){
newClients.splice(i,1)
save()
renderNewClients()
}

renderNewClients()

/* SEND */

function addSendFromClient(){

let c=clients[currentClient]

sendList.push({
name:c.name,
disease:c.disease,
phone:c.phone,
done:false
})

save()
renderSend()

}

function renderSend(){

sendTable.innerHTML=""

sendList.forEach((s,i)=>{

sendTable.innerHTML+=`
<tr>
<td>${s.name}</td>
<td>${s.disease}</td>
<td>${s.phone}</td>
<td><input type="checkbox" ${s.done?"checked":""}
onclick="sendList[${i}].done=this.checked;save()"></td>
<td><button class="delete" onclick="deleteSend(${i})">Delete</button></td>
</tr>
`

})

}

function deleteSend(i){
sendList.splice(i,1)
save()
renderSend()
}

renderSend()

/* REVIEW */

function addReview(){

reviewList.push({
name:reviewName.value,
disease:reviewDisease.value,
phone:reviewPhone.value,
done:false
})

save()
renderReview()

}

function renderReview(){

reviewTable.innerHTML=""

reviewList.forEach((r,i)=>{

reviewTable.innerHTML+=`
<tr class="${r.done?"review-done":"review-due"}">
<td>${r.name}</td>
<td>${r.disease}</td>
<td>${r.phone}</td>
<td><input type="checkbox" ${r.done?"checked":""}
onclick="reviewList[${i}].done=this.checked;save();renderReview()"></td>
<td><button class="delete" onclick="deleteReview(${i})">Delete</button></td>
</tr>
`

})

}

function deleteReview(i){
reviewList.splice(i,1)
save()
renderReview()
}

renderReview()

/* CLIENT MODAL */

let currentClient=null

function openClient(i){

currentClient=i
let c=clients[i]

modalTitle.innerText=c.name
clientStatus.value=c.status
clientAddress.value=c.address
clientReport.value=c.report

clientModal.style.display="flex"

renderFeedback()

}

function closeClientModal(){
clientModal.style.display="none"
}

clientStatus.onchange=()=>{
clients[currentClient].status=clientStatus.value
save()
}

clientAddress.oninput=()=>{
clients[currentClient].address=clientAddress.value
save()
}

clientReport.oninput=()=>{
clients[currentClient].report=clientReport.value
save()
}

function deleteClient(){

clients.splice(currentClient,1)

save()
renderClients()

closeClientModal()

}

/* FEEDBACK */

function addFeedback(){

let c=clients[currentClient]

c.feedback.push({
date:fdate.value,
progress:fprogress.value,
medicine:fmedicine.value
})

save()
renderFeedback()

}

function renderFeedback(){

let c=clients[currentClient]

feedbackList.innerHTML=""

c.feedback.forEach((f,i)=>{

feedbackList.innerHTML+=`
<div class="feedback-item">
${f.date} | ${f.progress} | ${f.medicine}
<button class="delete" onclick="deleteFeedback(${i})">x</button>
</div>
`

})

}

function deleteFeedback(i){

clients[currentClient].feedback.splice(i,1)

save()
renderFeedback()

}

/* NOTES */

function addNote(){

notes.push({title:"Note",body:""})
save()
renderNotes()

}

function renderNotes(){

notesContainer.innerHTML=""

notes.forEach((n,i)=>{

notesContainer.innerHTML+=`
<div style="background:#f8fafc;padding:15px;margin:10px;border-radius:8px">
<input value="${n.title}"
oninput="notes[${i}].title=this.value;save()">
<textarea
oninput="notes[${i}].body=this.value;save()">${n.body}</textarea>
<button class="delete" onclick="deleteNote(${i})">Delete</button>
</div>
`

})

}

function deleteNote(i){
notes.splice(i,1)
save()
renderNotes()
}

renderNotes()

</script>

</body>
</html>
